name: Android CI

# Build + lint the Android app on a clean runner so regressions (e.g. a broken
# vendored module or a web asset that fails to bundle) are caught automatically.
# Runs only when something that affects the APK changes — the web files listed
# below are copied into the APK at build time by app/build.gradle's copyWebApp.
on:
  push:
    branches: ['**']
    paths: &paths
      - 'android/**'
      - 'index.html'
      - 'app.js'
      - 'signal3d.js'
      - 'packet-store.js'
      - 'style.css'
      - 'native-bridge.js'
      - 'logo.svg'
      - 'vendor/**'
      - '.github/workflows/android-ci.yml'
  pull_request:
    paths: *paths

# Cancel an in-progress run when newer commits land on the same ref.
concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Build debug APK + lint
        working-directory: android
        run: ./gradlew --no-daemon --stacktrace assembleDebug lintDebug

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: android/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
