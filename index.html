<!doctype html>
<html lang="en" data-theme="night">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#07130f" />
    <meta name="description" content="MeshCore Finder uses confirmed relative signal observations to narrow a repeater search area." />
    <link rel="icon" href="./icons/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <title>MeshCore Finder</title>
    <script>
      (() => {
        try {
          const stored = localStorage.getItem('mcf-theme');
          const theme = stored || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'night');
          document.documentElement.dataset.theme = theme;
        } catch { /* storage may be unavailable in privacy mode */ }
      })();
    </script>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>
    <div id="app">
      <main class="boot" aria-busy="true"><span class="spinner" aria-hidden="true"></span><p>Opening local search log…</p></main>
    </div>
    <noscript>MeshCore Finder needs JavaScript to communicate with the companion radio and keep a local search log.</noscript>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
